  .tooltip {

    font-family: Georgia, 'Times New Roman', serif; color: #21254e;
    max-width: 290px; opacity: 0; transform: translateY(4px);

  }
  .tooltip.show { opacity: 1; transform: translateY(0); }
  .tt-name { font-weight: 700; font-size: 15px; line-height: 1.25; margin-bottom: 4px; }

  .footer { font-family: Georgia, 'Times New Roman', serif; font-size: 13px; line-height: 1.5; color: #21254e; margin: 0; }

const COL_M = "#e9590e";   // Mujer
const COL_H = "#1ba1b2";   // Hombre
const FILL_OP = 0.85;
const SVG_H = 500;
const MARGIN = { top: 16, right: 22, bottom: 26 };
const PAD = 1.5;

const ages = DATA.map(d => d.edad);
const minA = d3.min(ages), maxA = d3.max(ages);

// orden intercalado: reparte a las mujeres equitativamente a lo ancho
const totalM = DATA.filter(d => d.genero === "Hombre").length;
const totalW = DATA.length - totalM;
const posByIdx = (function () {
  let mi = 0, wi = 0;
  const arr = DATA.map((d, i) => {
    let key;
    if (d.genero === "Mujer") { key = (wi + 0.5) / totalW; wi++; }
    else { key = (mi + 0.5) / totalM; mi++; }
    return { i: i, key: key };
  });
  arr.sort((a, b) => a.key - b.key);
  const p = new Array(DATA.length);
  arr.forEach((o, pos) => { p[o.i] = pos; });
  return p;
})();

function bubbleR(plotW) { return 0.8 * Math.max(6, Math.min(17.5, 7.4 + 0.0121 * (plotW - 200))); }
const colorOf = d => d.genero === "Mujer" ? COL_M : COL_H;
const grupoLabel = { "Millennials": "Millennial", "Boomers": "Boomer" };

const container = document.getElementById("chart");
const tooltip = document.getElementById("tooltip");
let activeId = null, pinned = false, lastWidth = -1;

function dignidadLabel(d) {
  const dig = d.dignidad; // "Alcalde/sa" | "Prefecto/a"
  if (dig.toLowerCase().indexOf("alcalde") === 0)
    return dig + " de " + d.canton + " (" + d.provincia + ")";
  return dig + " de " + d.provincia;
}
function tooltipHTML(d) {
  return '<div class="tt-name">' + d.nombre + '</div>' +
         '<div class="tt-role">' + dignidadLabel(d) + '</div>' +
         '<div class="tt-meta">' + d.rango + '</div>' +
         '<div class="tt-meta">' + (grupoLabel[d.grupo] || d.grupo) + '</div>';
}
function hideTooltip() {
  tooltip.classList.remove("show");
  activeId = null; pinned = false;
  d3.selectAll(".bubble").classed("active", false);
}
function showTooltip(d, node) {
  tooltip.innerHTML = tooltipHTML(d);
  tooltip.style.borderLeftColor = colorOf(d);
  tooltip.classList.add("show");
  const w = container.clientWidth, ttW = tooltip.offsetWidth, ttH = tooltip.offsetHeight;
  let left = d.x + d.r + 12, top = d.y - ttH / 2;
  if (left + ttW > w) left = d.x - d.r - 12 - ttW;
  if (left < 0) left = 8;
  if (top < 4) top = 4;
  if (top + ttH > SVG_H - 4) top = SVG_H - 4 - ttH;
  tooltip.style.left = left + "px"; tooltip.style.top = top + "px";
  d3.selectAll(".bubble").classed("active", false);
  d3.select(node).classed("active", true);
  activeId = d.__id;
}

function render() {
  const width = container.clientWidth;
  lastWidth = width;
  d3.select(container).select("svg").remove();
  hideTooltip();

  const marginLeft = width < 480 ? 42 : 54;
  const plotW = width - marginLeft - MARGIN.right;
  const R = bubbleR(plotW), INSET = R + 4;
  const S = SVG_H - MARGIN.top - MARGIN.bottom;
  const N = DATA.length;

  const yScale = d3.scaleLinear()       // edad: mayor arriba
    .domain([minA, maxA])
    .range([MARGIN.top + S - INSET, MARGIN.top + INSET]);
  const center = marginLeft + plotW / 2;
  const BAND = 0.30 * plotW;             // franja central: agrupa los puntos en una masa
  const targetX = pos => center - BAND / 2 + (pos / (N - 1)) * BAND;

  const nodes = DATA.map((d, i) => {
    const tx = targetX(posByIdx[i]);
    return Object.assign({}, d, {
      __id: i, r: R, ty: yScale(d.edad), tx: tx, x: tx, y: yScale(d.edad)
    });
  });

  const sim = d3.forceSimulation(nodes)
    .force("x", d3.forceX(d => d.tx).strength(0.09))
    .force("y", d3.forceY(d => d.ty).strength(0.85))
    .force("collide", d3.forceCollide(R + PAD).strength(0.93).iterations(3))
    .stop();
  for (let i = 0; i < 750; i++) {
    sim.tick();
    for (const n of nodes) n.x = Math.max(marginLeft + R, Math.min(width - MARGIN.right - R, n.x));
  }

  container.style.height = SVG_H + "px";
  const svg = d3.select(container).append("svg")
    .attr("viewBox", "0 0 " + width + " " + SVG_H)
    .attr("width", width).attr("height", SVG_H)
    .attr("preserveAspectRatio", "xMidYMid meet")
    .attr("role", "img")
    .attr("aria-label", "Gráfico de burbujas: edad y género de alcaldes y prefectos");

  const ticks = [30, 40, 50, 60, 70].filter(t => t >= minA && t <= maxA);
  const topTick = d3.max(ticks);
  const grid = svg.append("g");
  grid.selectAll("line").data(ticks).join("line")
    .attr("class", "gridline")
    .attr("x1", marginLeft - 8).attr("x2", width - MARGIN.right)
    .attr("y1", d => yScale(d)).attr("y2", d => yScale(d));
  grid.selectAll("text").data(ticks).join("text")
    .attr("class", "ytick-label")
    .attr("x", marginLeft - 12).attr("y", d => yScale(d))
    .attr("text-anchor", "end").attr("dominant-baseline", "middle")
    .text(d => d === topTick ? d + " años" : d);

  svg.append("g").selectAll("circle").data(nodes).join("circle")
    .attr("class", "bubble")
    .attr("cx", d => d.x).attr("cy", d => d.y).attr("r", d => d.r)
    .attr("fill", d => colorOf(d))
    .attr("fill-opacity", FILL_OP)
    .attr("tabindex", 0).attr("role", "button")
    .attr("aria-label", d => d.nombre + ", " + dignidadLabel(d) + ", " + d.rango)
    .on("pointerenter", function (event, d) {
      if (event.pointerType === "mouse" && !pinned) showTooltip(d, this);
    })
    .on("pointerleave", function (event) {
      if (event.pointerType === "mouse" && !pinned) hideTooltip();
    })
    .on("click", function (event, d) {
      event.stopPropagation();
      if (pinned && activeId === d.__id) hideTooltip();
      else { showTooltip(d, this); pinned = true; }
    })
    .on("keydown", function (event, d) {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        if (pinned && activeId === d.__id) hideTooltip();
        else { showTooltip(d, this); pinned = true; }
      }
    });
}

container.addEventListener("click", function (e) {
  if (e.target.tagName !== "circle") hideTooltip();
});

render();

let rt;
window.addEventListener("resize", function () {
  clearTimeout(rt);
  rt = setTimeout(function () {
    if (container.clientWidth === lastWidth) return;
    render();
  }, 200);
});
</script>
